dataset: 'openpose'
joints_to_ign:
    - 1
    - 9
    - 12
data_folder: "data"
output_folder: 'smplx_mobilenet'
prior_folder: 'priors'
model_folder: 'models'
result_folder: 'results'
gender: "male"
model_type: 'smplx'
use_cuda: True
float_dtype: "float32"
use_joints_conf: True
use_pca: True
use_hands: True
use_face: True
flat_hand_mean: False
num_gaussians: 8
body_prior_type: 'l2'
left_hand_prior_type: l2
right_hand_prior_type: l2
jaw_prior_type: 'l2'
focal_length: 5000
num_pca_comps: 12
rho: 100
interpenetration: False
df_cone_height: 0.0001
penalize_outside: True
max_collisions: 128
optim_type: 'lbfgsls'
ftol: 1e-9
gtol: 1e-9
lr: 1.0
maxiters: 30
interactive: True
visualize: False
body_pose_prior_weights:
    - 4.04e2
    - 4.04e2
    - 57.4e0
    - 4.78e0
    - 4.78e0
coll_loss_weights:
    - 0.0
    - 0.0
    - 0.0
    - 0.01
    - 1.0
shape_weights:
    - 1.0e2
    - 5.0e1
    - 1.0e1
    - 0.5e1
    - 0.5e1
expr_weights:
    - 1.0e2
    - 5.0e1
    - 1.0e1
    - 0.5e1
    - 0.5e1
hand_pose_prior_weights:
    - 4.04e2
    - 4.04e2
    - 57.4
    - 4.78
    - 4.78
jaw_pose_prior_weights:
    - 4.04e03,4.04e04,4.04e04
    - 4.04e03,4.04e04,4.04e04
    - 574,5740,5740
    - 47.8,478,478
    - 47.8,478,478
hand_joints_weights:
    - 0.0
    - 0.0
    - 0.0
    - 0.1
    - 2.0
face_joints_weights:
    - 0.0
    - 0.0
    - 0.0
    - 0.0
    - 2.0

use_vposer: True
vposer_ckpt: "vposer"

# MobileNetV3 initialization
use_mobilenet_init: True
mobilenet_ckpt: "mobilenetv3-master/smplify_pth/checkpoint-best.pth"
